steps:
  - id: Build Next.js standalone output
    name: node:24
    entrypoint: bash
    env:
      - BASE_URL=${_BASE_URL}
      - GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_ORAMA_ENDPOINT=${_NEXT_PUBLIC_ORAMA_ENDPOINT}
      - ORAMA_INDEX_ID=${_ORAMA_INDEX_ID}
      - S3_REGION=${_S3_REGION}
      - S3_FILE_URL=${_S3_FILE_URL}
      - NEXT_PUBLIC_GAID=${_NEXT_PUBLIC_GAID}
    secretEnv:
      - GITHUB_TOKEN
      - GOOGLE_CLIENT_SECRET
      - NEXT_PUBLIC_ORAMA_API_KEY
      - ORAMA_PRIVATE_API_KEY
      - UPLOADTHING_TOKEN
      - BETTER_AUTH_SECRET
      - DATABASE_URL
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY
    args:
      - -ceu
      - |
        npm install -g pnpm@10.22.0
        pnpm install --frozen-lockfile
        pnpm build

  - id: Build container image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE_URI}
      - .

  - id: Push container image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_URI}

  - id: Deploy Cloud Run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy "${_SERVICE}" \
          --project "$PROJECT_ID" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --image "${_IMAGE_URI}" \
          --set-env-vars "BASE_URL=${_BASE_URL},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},NEXT_PUBLIC_ORAMA_ENDPOINT=${_NEXT_PUBLIC_ORAMA_ENDPOINT},ORAMA_INDEX_ID=${_ORAMA_INDEX_ID},S3_REGION=${_S3_REGION},S3_FILE_URL=${_S3_FILE_URL},NEXT_PUBLIC_GAID=${_NEXT_PUBLIC_GAID}" \
          --set-secrets "GITHUB_TOKEN=${_SECRET_GITHUB_TOKEN}:latest,GOOGLE_CLIENT_SECRET=${_SECRET_GOOGLE_CLIENT_SECRET}:latest,NEXT_PUBLIC_ORAMA_API_KEY=${_SECRET_NEXT_PUBLIC_ORAMA_API_KEY}:latest,ORAMA_PRIVATE_API_KEY=${_SECRET_ORAMA_PRIVATE_API_KEY}:latest,UPLOADTHING_TOKEN=${_SECRET_UPLOADTHING_TOKEN}:latest,BETTER_AUTH_SECRET=${_SECRET_BETTER_AUTH_SECRET}:latest,DATABASE_URL=${_SECRET_DATABASE_URL}:latest,S3_ACCESS_KEY_ID=${_SECRET_S3_ACCESS_KEY_ID}:latest,S3_SECRET_ACCESS_KEY=${_SECRET_S3_SECRET_ACCESS_KEY}:latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_GITHUB_TOKEN}/versions/latest
      env: GITHUB_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_GOOGLE_CLIENT_SECRET}/versions/latest
      env: GOOGLE_CLIENT_SECRET
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_NEXT_PUBLIC_ORAMA_API_KEY}/versions/latest
      env: NEXT_PUBLIC_ORAMA_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_ORAMA_PRIVATE_API_KEY}/versions/latest
      env: ORAMA_PRIVATE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_UPLOADTHING_TOKEN}/versions/latest
      env: UPLOADTHING_TOKEN
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_BETTER_AUTH_SECRET}/versions/latest
      env: BETTER_AUTH_SECRET
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_DATABASE_URL}/versions/latest
      env: DATABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_S3_ACCESS_KEY_ID}/versions/latest
      env: S3_ACCESS_KEY_ID
    - versionName: projects/$PROJECT_ID/secrets/${_SECRET_S3_SECRET_ACCESS_KEY}/versions/latest
      env: S3_SECRET_ACCESS_KEY

substitutions:
  _SERVICE: bili-archive
  _REGION: asia-east1
  _REPOSITORY: cloud-run
  _IMAGE_URI: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${BUILD_ID}
  _BASE_URL: ""
  _GOOGLE_CLIENT_ID: ""
  _NEXT_PUBLIC_ORAMA_ENDPOINT: ""
  _ORAMA_INDEX_ID: ""
  _S3_REGION: ""
  _S3_FILE_URL: ""
  _NEXT_PUBLIC_GAID: ""
  _SECRET_GITHUB_TOKEN: github-token
  _SECRET_GOOGLE_CLIENT_SECRET: google-client-secret
  _SECRET_NEXT_PUBLIC_ORAMA_API_KEY: next-public-orama-api-key
  _SECRET_ORAMA_PRIVATE_API_KEY: orama-private-api-key
  _SECRET_UPLOADTHING_TOKEN: uploadthing-token
  _SECRET_BETTER_AUTH_SECRET: better-auth-secret
  _SECRET_DATABASE_URL: database-url
  _SECRET_S3_ACCESS_KEY_ID: s3-access-key-id
  _SECRET_S3_SECRET_ACCESS_KEY: s3-secret-access-key

images:
  - ${_IMAGE_URI}

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
